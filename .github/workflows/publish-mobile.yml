name: Publish Mobile OTA

on:
  push:
    branches: [master]
    paths:
      - "apps/mobile/**"
      - "packages/**"

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas update --environment production --branch production --auto
        env:
          EXPO_PUBLIC_API_URL: https://api.garona.econome.studio
          EXPO_PUBLIC_PASSKEY_RP_ID: garona.econome.studio
